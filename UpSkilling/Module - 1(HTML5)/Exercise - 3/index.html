<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome Message with Styling and ID/Class</title>

    <style>

        #welcomeBanner {

            background-color: blue;

            color: white;

            padding: 20px;

            text-align: center;

            border-radius: 10px;
        }


        .highlight {

            background-color: yellow;

            font-weight: bold;

            padding: 5px;
        }

    </style>

</head>

<body>

    <div id="welcomeBanner">

        <h1>Welcome to Local Community Event Portal</h1>

        <p>

            Hello User!

            <span style="color: red; font-weight: bold;">

                Special Offer: Register today and get free event passes!

            </span>

        </p>

    </div>

    <br>

    <p class="highlight">

        Upcoming Event: Music Festival on 20 June 2026

    </p>

    <p>

        Join our

        <span class="highlight">

            Food Fair

        </span>

        and enjoy delicious cuisines.

    </p>

</body>

</html>
