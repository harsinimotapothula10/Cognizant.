<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Image Gallery for Community Events</title>

    <style>

        table {

            margin: auto;

            border-spacing: 20px;
        }

        caption {

            font-size: 28px;

            font-weight: bold;

            margin-bottom: 20px;
        }

        td {

            text-align: center;
        }

        .eventImage {

            width: 200px;

            height: 150px;

            border: 3px solid #007BFF;

            border-radius: 10px;

            padding: 5px;
        }

        .eventCaption {

            font-weight: bold;

            margin-top: 10px;
        }

    </style>

</head>

<body>

    <table>

        <caption>
            Community Events Gallery
        </caption>

        <tr>

            <td>

                <img src="https://picsum.photos/200/150?1"

                alt="Music Festival"

                title="Music Festival"

                class="eventImage">

                <p class="eventCaption">
                    Music Festival
                </p>

            </td>


            <td>

                <img src="https://picsum.photos/200/150?2"

                alt="Food Fair"

                title="Food Fair"

                class="eventImage">

                <p class="eventCaption">
                    Food Fair
                </p>

            </td>


            <td>

                <img src="https://picsum.photos/200/150?3"

                alt="Art Exhibition"

                title="Art Exhibition"

                class="eventImage">

                <p class="eventCaption">
                    Art Exhibition
                </p>

            </td>

        </tr>


        <tr>

            <td>

                <img src="https://picsum.photos/200/150?4"

                alt="Community Meeting"

                title="Community Meeting"

                class="eventImage">

                <p class="eventCaption">
                    Community Meeting
                </p>

            </td>


            <td>

                <img src="https://picsum.photos/200/150?5"

                alt="Sports Event"

                title="Sports Event"

                class="eventImage">

                <p class="eventCaption">
                    Sports Event
                </p>

            </td>


            <td>

                <img src="https://picsum.photos/200/150?6"

                alt="Book Fair"

                title="Book Fair"

                class="eventImage">

                <p class="eventCaption">
                    Book Fair
                </p>

            </td>

        </tr>

    </table>

</body>

</html>
